<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 Un momento especial se acerca...</title>
    <link rel="stylesheet" href="css/countdown.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600;900&family=Shippori+Mincho:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    
    <!-- Canvas para pétalos de cerezo -->
    <canvas id="sakura-canvas"></canvas>
    
    <!-- Capa de fondo con paisaje -->
    <div class="landscape-layer"></div>
    
    <!-- Partículas de luz -->
    <div id="light-particles"></div>
    
    <!-- Luna -->
    <div class="moon"></div>
    
    <!-- Contenido principal -->
    <div class="main-content">
        
        <!-- Título con efecto de brillo -->
        <div class="title-container">
            <h1 class="main-title">
                <span class="title-line-1">何か美しい</span>
                <span class="title-line-2">Algo hermoso</span>
                <span class="title-line-3">está por llegar...</span>
            </h1>
        </div>
        
        <!-- Contador -->
        <div id="countdown-container" class="countdown-container">
            <div class="time-block">
                <div class="time-number" id="days">00</div>
                <div class="time-label">Días</div>
            </div>
            <div class="time-separator">:</div>
            <div class="time-block">
                <div class="time-number" id="hours">00</div>
                <div class="time-label">Horas</div>
            </div>
            <div class="time-separator">:</div>
            <div class="time-block">
                <div class="time-number" id="minutes">00</div>
                <div class="time-label">Minutos</div>
            </div>
            <div class="time-separator">:</div>
            <div class="time-block">
                <div class="time-number" id="seconds">00</div>
                <div class="time-label">Segundos</div>
            </div>
        </div>
        
        <!-- Botón de entrada (oculto hasta que llegue la fecha) -->
        <button id="enter-button" class="enter-button hidden" onclick="window.location.href='main.html'">
            <span class="button-text">Entrar</span>
            <span class="button-icon">✨</span>
        </button>
        
        <!-- Mensaje de espera -->
        <p class="waiting-message" id="waiting-message">Mientras tanto, disfruta la espera...</p>
        
        <!-- Controles de música -->
        <div class="music-controls">
            <button id="music-toggle" class="music-button">
                <span class="music-icon">🎵</span>
                <span id="music-text">Pausar música</span>
            </button>
        </div>
        
        <!-- Instrucción para iniciar audio -->
        <p class="audio-instruction" id="audio-instruction">
            🎐 Toca la pantalla para comenzar la música...
        </p>
        
    </div>
    
    <!-- Reproductor de YouTube invisible -->
    <div id="youtube-player"></div>

    <script src="js/countdown.js"></script>
    
    <!-- API de YouTube -->
    <script>
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
    </script>
    
</body>
</html>
